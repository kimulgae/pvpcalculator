<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVP 승률 예측기 PRO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>⚔️ PVP 승률 예측기 <span class="badge">PRO</span></h1>
        <p class="subtitle">기본 스탯 입력, 세부 옵션 스캔, 장착 스킬만 선택하세요!</p>
        
        <div class="upload-section">
            <!-- 나의 세팅 -->
            <div class="player-card">
                <h2>나의 세팅</h2>
                <div class="manual-input-group">
                    <div class="input-row">
                        <label>총 피해</label>
                        <input type="number" id="myDmgVal" placeholder="숫자 입력" step="any">
                        <select id="myDmgUnit">
                            <option value="none">단위 없음</option>
                            <option value="k">K</option>
                            <option value="m">M</option>
                            <option value="b" selected>B</option>
                            <option value="t">T</option>
                            <option value="q">Q</option>
                        </select>
                    </div>
                    <div class="input-row">
                        <label>총 체력</label>
                        <input type="number" id="myHpVal" placeholder="숫자 입력" step="any">
                        <select id="myHpUnit">
                            <option value="none">단위 없음</option>
                            <option value="k">K</option>
                            <option value="m">M</option>
                            <option value="b" selected>B</option>
                            <option value="t">T</option>
                            <option value="q">Q</option>
                        </select>
                    </div>
                    <div class="input-row">
                        <label>장착 스킬</label>
                        <select id="mySkill">
                            <option value="None" selected>스킬 없음</option>
                            <option value="Meat">고기 (Meat)</option>
                            <option value="Arrows">화살 (Arrows)</option>
                            <option value="Shout">외침 (Shout)</option>
                            <option value="Berserk">광전사 (Berserk)</option>
                            <option value="Cannon">포격 (Cannon)</option>
                            <option value="Shuriken">수리검 (Shuriken)</option>
                            <option value="Buff">버프 (Buff)</option>
                            <option value="ArrowRains">화살비 (Arrow Rains)</option>
                            <option value="Thorns">가시 (Thorns)</option>
                            <option value="Bomb">폭탄 (Bomb)</option>
                            <option value="Meteorite">운석 (Meteorite)</option>
                            <option value="Morale">사기 (Morale)</option>
                            <option value="Lightning">번개 (Lightning)</option>
                            <option value="Stampede">쇄도 (Stampede)</option>
                            <option value="Worm">벌레 (Worm)</option>
                            <option value="Drone">드론 (Drone)</option>
                            <option value="HigherMorale">높은 사기 (Higher Morale)</option>
                            <option value="StrafeRun">기총 소사 (Strafe Run)</option>
                        </select>
                    </div>
                </div>
                <hr class="divider">
                <label class="scan-label">📸 세부 옵션 및 스킬 자동 스캔</label>
                <input type="file" id="myImage" accept="image/*" multiple>
                <p class="status" id="myStatus">스크린샷을 올리면 아래에 옵션이 추가됩니다.</p>
                <div id="myOptionList" class="option-list"></div>
            </div>

            <!-- 상대방 세팅 -->
            <div class="player-card">
                <h2>상대방 세팅</h2>
                <div class="manual-input-group">
                    <div class="input-row">
                        <label>총 피해</label>
                        <input type="number" id="enemyDmgVal" placeholder="숫자 입력" step="any">
                        <select id="enemyDmgUnit">
                            <option value="none">단위 없음</option>
                            <option value="k">K</option>
                            <option value="m">M</option>
                            <option value="b" selected>B</option>
                            <option value="t">T</option>
                            <option value="q">Q</option>
                        </select>
                    </div>
                    <div class="input-row">
                        <label>총 체력</label>
                        <input type="number" id="enemyHpVal" placeholder="숫자 입력" step="any">
                        <select id="enemyHpUnit">
                            <option value="none">단위 없음</option>
                            <option value="k">K</option>
                            <option value="m">M</option>
                            <option value="b" selected>B</option>
                            <option value="t">T</option>
                            <option value="q">Q</option>
                        </select>
                    </div>
                    <div class="input-row">
                        <label>장착 스킬</label>
                        <select id="enemySkill">
                            <option value="None" selected>스킬 없음</option>
                            <option value="Meat">고기 (Meat)</option>
                            <option value="Arrows">화살 (Arrows)</option>
                            <option value="Shout">외침 (Shout)</option>
                            <option value="Berserk">광전사 (Berserk)</option>
                            <option value="Cannon">포격 (Cannon)</option>
                            <option value="Shuriken">수리검 (Shuriken)</option>
                            <option value="Buff">버프 (Buff)</option>
                            <option value="ArrowRains">화살비 (Arrow Rains)</option>
                            <option value="Thorns">가시 (Thorns)</option>
                            <option value="Bomb">폭탄 (Bomb)</option>
                            <option value="Meteorite">운석 (Meteorite)</option>
                            <option value="Morale">사기 (Morale)</option>
                            <option value="Lightning">번개 (Lightning)</option>
                            <option value="Stampede">쇄도 (Stampede)</option>
                            <option value="Worm">벌레 (Worm)</option>
                            <option value="Drone">드론 (Drone)</option>
                            <option value="HigherMorale">높은 사기 (Higher Morale)</option>
                            <option value="StrafeRun">기총 소사 (Strafe Run)</option>
                        </select>
                    </div>
                </div>
                <hr class="divider">
                <label class="scan-label">📸 세부 옵션 및 스킬 자동 스캔</label>
                <input type="file" id="enemyImage" accept="image/*" multiple>
                <p class="status" id="enemyStatus">스크린샷을 올리면 아래에 옵션이 추가됩니다.</p>
                <div id="enemyOptionList" class="option-list"></div>
            </div>
        </div>

        <button id="calcBtn" class="calc-btn">승률 시뮬레이션 시작</button>
        
        <div class="result-section">
            <h2 id="resultText">예상 승률: - %</h2>
            <div class="progress-bar"><div id="winRateFill" class="progress-fill"></div></div>
            <p id="feedbackText" class="feedback">스탯과 옵션을 입력/스캔하고 계산을 눌러주세요.</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
