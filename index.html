<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVP 승률 예측기 PRO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>⚔️ PVP 승률 예측기 <span class="badge">PRO</span></h1>
        <p class="subtitle">기본 스탯을 입력하고 스크린샷을 올리면 옵션과 3개의 스킬이 자동 스캔됩니다!</p>
        
        <div class="upload-section">
            <div class="player-card">
                <h2>나의 세팅</h2>
                <div class="manual-input-group">
                    <div class="input-row">
                        <label>총 피해</label>
                        <input type="number" id="myDmgVal" placeholder="숫자 입력" step="any">
                        <select id="myDmgUnit">
                            <option value="none">단위 없음</option>
                            <option value="k">K</option>
                            <option value="m">M</option>
                            <option value="b" selected>B</option>
                            <option value="t">T</option>
                            <option value="q">Q</option>
                        </select>
                    </div>
                    <div class="input-row">
                        <label>총 체력</label>
                        <input type="number" id="myHpVal" placeholder="숫자 입력" step="any">
                        <select id="myHpUnit">
                            <option value="none">단위 없음</option>
                            <option value="k">K</option>
                            <option value="m">M</option>
                            <option value="b" selected>B</option>
                            <option value="t">T</option>
                            <option value="q">Q</option>
                        </select>
                    </div>
                </div>

                <div class="skill-slots-container">
                    <label>장착 스킬 (최대 3개 자동스캔)</label>
                    <div class="skill-slots">
                        <select id="mySkill1">
                            <option value="None" selected>없음</option>
                            <option value="Meat">🍖 고기</option>
                            <option value="Arrows">🏹 화살</option>
                            <option value="Shout">🗣️ 외침</option>
                            <option value="Berserk">😡 광전사</option>
                            <option value="Cannon">💣 포격</option>
                            <option value="Shuriken">🥷 수리검</option>
                            <option value="Buff">💪 버프</option>
                            <option value="ArrowRains">🌧️ 화살비</option>
                            <option value="Thorns">🌵 가시</option>
                            <option value="Bomb">💣 폭탄</option>
                            <option value="Meteorite">☄️ 운석</option>
                            <option value="Morale">⭐ 사기</option>
                            <option value="Lightning">⚡ 번개</option>
                            <option value="Stampede">🐗 쇄도</option>
                            <option value="Worm">🐛 벌레</option>
                            <option value="Drone">🚁 드론</option>
                            <option value="HigherMorale">👼 높은사기</option>
                            <option value="StrafeRun">🛩️ 기총소사</option>
                        </select>
                        <select id="mySkill2">
                            </select>
                        <select id="mySkill3">
                        </select>
                    </div>
                </div>

                <hr class="divider">
                <label class="scan-label">📸 세부 옵션 자동 스캔 (여러 장 가능)</label>
                <input type="file" id="myImage" accept="image/*" multiple>
                <p class="status" id="myStatus">스크린샷을 올리면 아래에 옵션이 추가됩니다.</p>
                <div id="myOptionList" class="option-list"></div>
            </div>

            <div class="player-card">
                <h2>상대방 세팅</h2>
                <div class="manual-input-group">
                    <div class="input-row">
                        <label>총 피해</label>
                        <input type="number" id="enemyDmgVal" placeholder="숫자 입력" step="any">
                        <select id="enemyDmgUnit">
                            <option value="none">단위 없음</option>
                            <option value="k">K</option>
                            <option value="m">M</option>
                            <option value="b" selected>B</option>
                            <option value="t">T</option>
                            <option value="q">Q</option>
                        </select>
                    </div>
                    <div class="input-row">
                        <label>총 체력</label>
                        <input type="number" id="enemyHpVal" placeholder="숫자 입력" step="any">
                        <select id="enemyHpUnit">
                            <option value="none">단위 없음</option>
                            <option value="k">K</option>
                            <option value="m">M</option>
                            <option value="b" selected>B</option>
                            <option value="t">T</option>
                            <option value="q">Q</option>
                        </select>
                    </div>
                </div>

                <div class="skill-slots-container">
                    <label>장착 스킬 (최대 3개 자동스캔)</label>
                    <div class="skill-slots">
                        <select id="enemySkill1"></select>
                        <select id="enemySkill2"></select>
                        <select id="enemySkill3"></select>
                    </div>
                </div>

                <hr class="divider">
                <label class="scan-label">📸 세부 옵션 자동 스캔 (여러 장 가능)</label>
                <input type="file" id="enemyImage" accept="image/*" multiple>
                <p class="status" id="enemyStatus">스크린샷을 올리면 아래에 옵션이 추가됩니다.</p>
                <div id="enemyOptionList" class="option-list"></div>
            </div>
        </div>

        <button id="calcBtn" class="calc-btn">승률 시뮬레이션 시작</button>
        
        <div class="result-section">
            <h2 id="resultText">예상 승률: - %</h2>
            <div class="progress-bar"><div id="winRateFill" class="progress-fill"></div></div>
            <p id="feedbackText" class="feedback">스탯을 입력하고 옵션을 스캔한 뒤 계산을 눌러주세요.</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
