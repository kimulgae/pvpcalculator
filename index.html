<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVP 승률 예측기</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>⚔️ PVP 승률 예측기</h1>
        <p class="subtitle">기본 스탯을 입력하고, 스킬과 승천 단계를 세팅한 뒤 옵션을 스캔하세요!</p>
        
        <div class="upload-section">
            <div class="player-card">
                <h2>나의 세팅</h2>
                <div class="manual-input-group">
                    <div class="input-row">
                        <label>총 피해</label>
                        <input type="number" id="myDmgVal" placeholder="숫자 입력" step="any">
                        <select id="myDmgUnit">
                            <option value="none">단위 없음</option>
                            <option value="k">K</option>
                            <option value="m">M</option>
                            <option value="b" selected>B</option>
                            <option value="t">T</option>
                            <option value="q">Q</option>
                        </select>
                    </div>
                    <div class="input-row">
                        <label>총 체력</label>
                        <input type="number" id="myHpVal" placeholder="숫자 입력" step="any">
                        <select id="myHpUnit">
                            <option value="none">단위 없음</option>
                            <option value="k">K</option>
                            <option value="m">M</option>
                            <option value="b" selected>B</option>
                            <option value="t">T</option>
                            <option value="q">Q</option>
                        </select>
                    </div>
                </div>

                <div class="skill-slots-container">
                    <label>장착 스킬 (수동 선택)</label>
                    <div class="skill-slots">
                        <div class="skill-item"><select id="mySkill1"></select></div>
                        <div class="skill-item"><select id="mySkill2"></select></div>
                        <div class="skill-item"><select id="mySkill3"></select></div>
                    </div>
                    <div class="ascension-slot">
                        <label>🌟 스킬 승천 단계</label>
                        <select id="myAscension" class="asc-select-full">
                            <option value="0">승천 0단계</option>
                            <option value="1">승천 1단계</option>
                            <option value="2">승천 2단계</option>
                            <option value="3">승천 3단계</option>
                        </select>
                    </div>
                </div>

                <hr class="divider">
                <label class="scan-label">📸 세부 옵션 스캔 (여러 장 가능)</label>
                <input type="file" id="myImage" accept="image/*" multiple>
                <p class="status" id="myStatus">스크린샷을 올리면 아래에 옵션이 추가됩니다.</p>
                <div id="myOptionList" class="option-list"></div>
            </div>

            <div class="player-card">
                <h2>상대방 세팅</h2>
                <div class="manual-input-group">
                    <div class="input-row">
                        <label>총 피해</label>
                        <input type="number" id="enemyDmgVal" placeholder="숫자 입력" step="any">
                        <select id="enemyDmgUnit">
                            <option value="none">단위 없음</option>
                            <option value="k">K</option>
                            <option value="m">M</option>
                            <option value="b" selected>B</option>
                            <option value="t">T</option>
                            <option value="q">Q</option>
                        </select>
                    </div>
                    <div class="input-row">
                        <label>총 체력</label>
                        <input type="number" id="enemyHpVal" placeholder="숫자 입력" step="any">
                        <select id="enemyHpUnit">
                            <option value="none">단위 없음</option>
                            <option value="k">K</option>
                            <option value="m">M</option>
                            <option value="b" selected>B</option>
                            <option value="t">T</option>
                            <option value="q">Q</option>
                        </select>
                    </div>
                </div>

                <div class="skill-slots-container">
                    <label>장착 스킬 (수동 선택)</label>
                    <div class="skill-slots">
                        <div class="skill-item"><select id="enemySkill1"></select></div>
                        <div class="skill-item"><select id="enemySkill2"></select></div>
                        <div class="skill-item"><select id="enemySkill3"></select></div>
                    </div>
                    <div class="ascension-slot">
                        <label>🌟 스킬 승천 단계</label>
                        <select id="enemyAscension" class="asc-select-full">
                            <option value="0">승천 0단계</option>
                            <option value="1">승천 1단계</option>
                            <option value="2">승천 2단계</option>
                            <option value="3">승천 3단계</option>
                        </select>
                    </div>
                </div>

                <hr class="divider">
                <label class="scan-label">📸 세부 옵션 스캔 (여러 장 가능)</label>
                <input type="file" id="enemyImage" accept="image/*" multiple>
                <p class="status" id="enemyStatus">스크린샷을 올리면 아래에 옵션이 추가됩니다.</p>
                <div id="enemyOptionList" class="option-list"></div>
            </div>
        </div>

        <button id="calcBtn" class="calc-btn">승률 시뮬레이션 시작</button>
        
        <div class="result-section">
            <h2 id="resultText">예상 승률: - %</h2>
            <div class="progress-bar"><div id="winRateFill" class="progress-fill"></div></div>
            <p id="feedbackText" class="feedback">스탯과 스킬을 꼼꼼히 세팅하고 계산을 눌러주세요.</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
