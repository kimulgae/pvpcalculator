<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVP 승률 예측기 PRO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>⚔️ PVP 승률 예측기 <span class="badge">PRO</span></h1>
        <p class="subtitle">옵션이 많다면 스크린샷을 여러 장 선택해서 한 번에 올리세요!</p>
        
        <div class="upload-section">
            <div class="player-card">
                <h2>나의 세팅 분석</h2>
                <input type="file" id="myImage" accept="image/*" multiple>
                <p class="status" id="myStatus">스탯 창 스크린샷을 업로드해주세요. (다중 선택 가능)</p>
                <div id="myOptionList" class="option-list"></div>
            </div>

            <div class="player-card">
                <h2>상대방 세팅 분석</h2>
                <input type="file" id="enemyImage" accept="image/*" multiple>
                <p class="status" id="enemyStatus">스탯 창 스크린샷을 업로드해주세요. (다중 선택 가능)</p>
                <div id="enemyOptionList" class="option-list"></div>
            </div>
        </div>

        <button id="calcBtn" class="calc-btn" disabled>데이터 분석 대기 중...</button>
        
        <div class="result-section">
            <h2 id="resultText">예상 승률: - %</h2>
            <div class="progress-bar">
                <div id="winRateFill" class="progress-fill"></div>
            </div>
            <p id="feedbackText" class="feedback">양측의 스크린샷을 모두 업로드하면 정밀 시뮬레이션이 시작됩니다.</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
